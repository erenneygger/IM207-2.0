<!DOCTYPE html>
<html>
<head>
    <title>GCash Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #007dfe; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .payment-card { width: 380px; border-radius: 20px; border: none; }
        .gcash-blue { color: #007dfe; font-weight: bold; }
    </style>
</head>
<body>
<div class="card p-4 shadow-lg payment-card">
    <div class="text-center mb-4">
        <h3 class="gcash-blue">GCash</h3>
        <p class="text-muted">Secure Payment Portal</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for category, msg in messages %}
          <div class="alert alert-{{category}} py-2 small">{{msg}}</div>
      {% endfor %}{% endif %}
    {% endwith %}

    <div class="bg-light p-3 rounded mb-4">
        <div class="d-flex justify-content-between small">
            <span>Ticket ID:</span> <strong>#{{ticket.id}}</strong>
        </div>
        <div class="d-flex justify-content-between small">
            <span>Plate:</span> <strong>{{ticket.plate_number}}</strong>
        </div>
        <hr>
        <div class="d-flex justify-content-between">
            <span class="fw-bold">Amount Due:</span> <span class="text-primary fw-bold">₱{{ticket.fee}}</span>
        </div>
    </div>

    <form method="post">
        <div class="mb-3">
            <label class="form-label small fw-bold">GCash Number</label>
            <input type="text" name="gcash_number" class="form-control" placeholder="09xxxxxxxxx" required pattern="09[0-9]{9}">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Amount to Pay</label>
            <div class="input-group">
                <span class="input-group-text">₱</span>
                <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Pay Now</button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('ticket', ticket_id=ticket.id) }}" class="text-decoration-none text-muted small">
            <i class="fas fa-arrow-left"></i> Cancel and go back
        </a>
    </div>
</div>
</body>
</html>
