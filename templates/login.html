<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PARKTOLL</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #e8eff9;
            height: 100vh;
        }
        .login-container {
            max-width: 600px; /* Wider container */
            width: 90%;
            margin: auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.07);
            text-align: center;
        }
        .login-title {
            color: #007bff;
            font-weight: 600;
            font-size: 22px;
        }
        .form-control {
            border-radius: 30px;
        }
        .btn-login {
            border-radius: 30px;
            background: #2188ff;
            border: none;
            color: white;
        }
        .logo-img {
            height: 90px;
            margin-bottom: 15px;
        }
        .toggle-pass {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #333;
        }
    </style>
</head>
<body>

<div class="d-flex align-items-center justify-content-center h-100">
    <div class="login-container">

        <!-- Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img" alt="PARKTOLL Logo">

        <!-- Title -->
        <h4 class="login-title mb-2">Welcome to PARKTOLL!</h4>
        <p class="text-secondary mb-4" style="font-size: 14px;">
            Please Login to Your Account
        </p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="alert alert-{{ category }} py-1">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form method="POST">

            <div class="mb-3">
                <input type="email" class="form-control px-4" name="email"
                       placeholder="Email" required>
            </div>

            <!-- Password with eye icon -->
            <div class="position-relative mb-3">
                <input id="login-password" type="password" class="form-control px-4"
                       name="password" placeholder="Password" required>
                <span class="toggle-pass" onclick="togglePassword('login-password')">
                    <!-- Minimalist 2D Eye Icon -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                         stroke="#333" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M1 12s4.5-8 11-8 11 8 11 8-4.5 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <div class="form-check text-start ms-1 mb-3">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-login btn-primary w-100 mb-2">
                Login
            </button>

        </form>

        <div class="text-center">
            <a href="/forgot_password" class="text-decoration-none" style="font-size: 13px;">
                Forgot Password?
            </a>
        </div>

        <hr>

        <p style="font-size: 14px;">
            Don't have an account?
            <a href="/register">Signup</a>
        </p>

    </div>
</div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
