<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot Password | PARKTOLL</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background: #e8eff9;
            height: 100vh;
        }
        .forgot-container {
            max-width: 380px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.07);
            text-align: center;
        }
        .forgot-title {
            color: #007bff;
            font-weight: 600;
        }
        .form-control {
            border-radius: 30px;
        }
        .btn-reset {
            border-radius: 30px;
            background: #2188ff;
            border: none;
            color: white;
        }
        .logo-img {
            height: 80px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center h-100">
    <div class="forgot-container">

        <!-- Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img" alt="PARKTOLL Logo" />

        <!-- Title -->
        <h4 class="forgot-title mb-2">Forgot Password</h4>
        <p class="text-secondary mb-4" style="font-size: 14px;">
            Enter your email to reset your password
        </p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="alert alert-{{ category }} py-1">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <!-- Forgot Password Form -->
        <form method="POST">
            <input type="email" class="form-control mb-3 px-4" name="email" placeholder="Email" required />
            <button type="submit" class="btn btn-reset w-100 mb-2">Reset Password</button>
        </form>

        <hr />

        <p style="font-size: 14px;">
            Remember your password? <a href="/login">Login</a>
        </p>

    </div>
</div>
</body>
</html>
