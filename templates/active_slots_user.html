<!DOCTYPE html>
<html>
<head>
    <title>Active Parking Spaces</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .slot-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .slot {
            width: 70px;
            height: 70px;
            margin: 8px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            transition: transform 0.2s;
            font-size: 0.8rem;
        }
        .slot:hover { transform: scale(1.05); }
        .available { background-color: #28a745; border: 2px solid #1e7e34; }
        .occupied { background-color: #dc3545; border: 2px solid #bd2130; }
        .slot i { font-size: 1.2rem; margin-bottom: 2px; }
    </style>
</head>

<body>
<div class="container mt-5">
    <div class="slot-container">
        <h3 class="mb-4 text-center text-primary">
            <i class="fas fa-parking"></i> Real-Time Space Availability
        </h3>

        <div class="d-flex justify-content-center gap-3 mb-5">
            <div class="d-flex align-items-center gap-2">
                <div style="width: 20px; height: 20px; background: #28a745; border-radius: 4px;"></div>
                <span>Available</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div style="width: 20px; height: 20px; background: #dc3545; border-radius: 4px;"></div>
                <span>Occupied</span>
            </div>
        </div>

        <h5 class="border-bottom pb-2"><i class="fas fa-car"></i> Car Parking Area</h5>
        <div class="d-flex flex-wrap justify-content-center mb-5">
            {% for occupied in car_slots %}
                <div class="slot {% if occupied %}occupied{% else %}available{% endif %}">
                    <i class="fas {% if occupied %}fa-car-side{% else %}fa-check-circle{% endif %}"></i>
                    S-{{ loop.index }}
                </div>
            {% endfor %}
        </div>

        <h5 class="border-bottom pb-2"><i class="fas fa-motorcycle"></i> Motorcycle Parking Area</h5>
        <div class="d-flex flex-wrap justify-content-center mb-4">
            {% for occupied in moto_slots %}
                <div class="slot {% if occupied %}occupied{% else %}available{% endif %}">
                    <i class="fas {% if occupied %}fa-user-slash{% else %}fa-motorcycle{% endif %}"></i>
                    M-{{ loop.index }}
                </div>
            {% endfor %}
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('user_home') }}" class="btn btn-dark px-5">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
</body>
</html>
