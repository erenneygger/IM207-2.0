<!DOCTYPE html>
<html>
<head>
<title>Admin Home</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="navbar">

    <a href="/admin_home" class="logo-nav">
        <img src="{{ url_for('static', filename='images/logo.png') }}">
        <span>PARKTOLL SYSTEM</span>
    </a>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/active_slots">View Spaces</a>
        <a href="/logout" style="margin-left:50px;">Logout</a>
    </div>

</div>

<div class="hero">
    <img src="{{ url_for('static', filename='images/parking.jpg') }}">
</div>

<div class="cards">

    <div class="card">
        <i class="fas fa-eye"></i>
        <h3>View Parking Space</h3>
        <p>Explore available parking spaces</p>
        <a href="/active_slots">Go →</a>
    </div>

    <div class="card">
        <i class="fas fa-book-open"></i>
        <h3>View Reports</h3>
        <p>Check reports and income</p>
        <a href="/dashboard">Go →</a>
    </div>

    <div class="card">
        <i class="fas fa-car"></i>
        <h3>Space Status</h3>
        <p>Check current usage</p>
        <a href="/active_slots">Go →</a>
    </div>

</div>

</body>
</html>
