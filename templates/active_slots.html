<!DOCTYPE html>
<html>
<head>
    <title>Admin - Active Parking Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #f1f3f5; }
        .admin-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 5px solid #0d6efd; /* Admin Blue Theme */
        }
        .slot {
            width: 65px;
            height: 65px;
            margin: 6px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        /* Admin specific styling */
        .car-area { background-color: #198754; border: 2px solid #146c43; } /* Green */
        .moto-area { background-color: #198754; border: 2px solid #146c43; } /* Green */
        .occupied {
            background-color: #dc3545 !important;
            border: 2px solid #a71d2a !important;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }
        .slot i { font-size: 1.1rem; margin-bottom: 3px; }
        .section-header {
            color: #495057;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
<div class="container mt-5">
    <div class="admin-container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="section-header m-0"><i class="fas fa-tools"></i> Admin Slot Monitor</h3>
            <div>
                <span class="badge bg-success p-2"><i class="fas fa-check"></i> Available</span>
                <span class="badge bg-danger p-2"><i class="fas fa-times"></i> Occupied</span>
            </div>
        </div>

        <hr>

        <div class="mb-5">
            <h5 class="mb-3 text-secondary"><i class="fas fa-car"></i> Car Zone (A1 - A10)</h5>
            <div class="d-flex flex-wrap">
                {% for occupied in car_slots %}
                    <div class="slot car-area {% if occupied %}occupied{% endif %}">
                        <i class="fas {% if occupied %}fa-car{% else %}fa-border-none{% endif %}"></i>
                        A{{ loop.index }}
                    </div>
                {% endfor %}
            </div>
        </div>

        <div class="mb-4">
            <h5 class="mb-3 text-secondary"><i class="fas fa-motorcycle"></i> Motorcycle Zone (M1 - M10)</h5>
            <div class="d-flex flex-wrap">
                {% for occupied in moto_slots %}
                    <div class="slot moto-area {% if occupied %}occupied{% endif %}">
                        <i class="fas {% if occupied %}fa-motorcycle{% else %}fa-border-none{% endif %}"></i>
                        M{{ loop.index }}
                    </div>
                {% endfor %}
            </div>
        </div>

        <div class="mt-5 border-top pt-4 text-start">
            <a href="{{ url_for('admin_home') }}" class="btn btn-outline-primary px-4">
                <i class="fas fa-chevron-left"></i> Return to Admin Panel
            </a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary px-4 ms-2">
                <i class="fas fa-chart-line"></i> View Statistics
            </a>
        </div>

    </div>
</div>
</body>
</html>
