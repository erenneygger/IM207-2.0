<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PARKTOLL</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #e8eff9;
            height: 100vh;
        }
        .register-container {
            max-width: 600px;
            width: 90%;
            margin: auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.07);
            text-align: center;
        }
        .register-title {
            color: #007bff;
            font-weight: 600;
            font-size: 22px;
        }
        .form-control {
            border-radius: 30px;
        }
        .btn-register {
            border-radius: 30px;
            background: #2188ff;
            border: none;
            color: white;
            font-weight: 500;
        }
        .logo-img {
            height: 90px;
            margin-bottom: 15px;
        }
        .toggle-pass {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #333;
        }
    </style>
</head>
<body>

<div class="d-flex align-items-center justify-content-center h-100">
    <div class="register-container">

        <!-- Logo -->
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo-img" alt="PARKTOLL Logo">

        <!-- Title -->
        <h4 class="register-title mb-3">Create Your Account</h4>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert alert-{{ category }} py-1">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Register Form -->
        <form method="POST">

            <input type="text" class="form-control mb-3 px-4" name="fullname"
                   placeholder="Full Name" required>

            <input type="email" class="form-control mb-3 px-4" name="email"
                   placeholder="Email" required>

            <input type="text" class="form-control mb-3 px-4" name="username"
                   placeholder="Username" required>

            <!-- Password Field -->
            <div class="position-relative mb-3">
                <input id="password" type="password" class="form-control px-4"
                       name="password" placeholder="Password" required>
                <span class="toggle-pass" onclick="togglePassword('password')">
                    <!-- Minimalist 2D Eye Icon -->
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4.5-8 11-8 11 8 11 8-4.5 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <!-- Confirm Password Field -->
            <div class="position-relative mb-3">
                <input id="confirm" type="password" class="form-control px-4"
                       name="confirm" placeholder="Confirm Password" required>
                <span class="toggle-pass" onclick="togglePassword('confirm')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4.5-8 11-8 11 8 11 8-4.5 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <button type="submit" class="btn btn-register w-50 mb-2">Sign Up</button>
        </form>

        <hr>

        <p style="font-size: 15px;">
            Already have an account? <a href="/login">Login</a>
        </p>

    </div>
</div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
